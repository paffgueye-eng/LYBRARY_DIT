name: CI / CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PIP_CACHE_DIR: ${{ runner.temp }}/pip-cache

jobs:
  tests:
    name: Backend tests (matrix OS)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: bibliotheque.settings
        run: |
          python manage.py test --noinput

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-output-${{ matrix.os }}
          path: |
            ./logs || true

  docker-compose-deploy:
    name: Build & Compose (integration smoke)
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 40
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RECOMMENDATION_API_KEY: ${{ secrets.RECOMMENDATION_API_KEY }}
      RECOMMENDATION_SERVICE_URL: http://localhost:8001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache pip for build
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: build-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Build and start services with Docker Compose
        run: |
          docker compose pull || true
          docker compose build --pull --progress=plain
          docker compose up -d

      - name: Wait for services to become healthy
        run: |
          set -e
          echo "Waiting for Django (http://localhost:8000)..."
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/ >/dev/null; then echo OK && break; fi
            echo "waiting for django... ($i)"; sleep 5
          done
          echo "Waiting for Reco API (http://localhost:8001/docs)..."
          for i in {1..30}; do
            if curl -sSf http://localhost:8001/docs >/dev/null; then echo OK && break; fi
            echo "waiting for reco... ($i)"; sleep 5
          done

      - name: Run a quick smoke test against endpoints
        run: |
          set -e
          curl -fSf http://localhost:8000/ || (docker compose logs --no-color > compose-logs.txt && false)
          curl -fSf http://localhost:8001/docs || (docker compose logs --no-color > compose-logs.txt && false)

      - name: Collect docker-compose logs
        if: failure()
        run: |
          docker compose logs --no-color > compose-logs.txt || true

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down compose
        if: always()
        run: |
          docker compose down --volumes --remove-orphans

  dvc-repro:
    name: DVC pipeline (repro & metrics)
    runs-on: ubuntu-latest
    needs: tests
    env:
      DVC_REMOTE_URL: ${{ secrets.DVC_REMOTE_URL }}
      DVC_SERVICE_ACCOUNT_JSON: ${{ secrets.DVC_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip for dvc
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: dvc-pip-${{ hashFiles('**/requirements-dvc.txt') }}

      - name: Install DVC dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dvc.txt

      - name: Configure DVC remote (optional)
        run: |
          if [ -n "${{ env.DVC_REMOTE_URL }}" ]; then
            dvc remote add -f origin "${{ env.DVC_REMOTE_URL }}" || true
            echo "DVC remote configured: $DVC_REMOTE_URL"
          else
            echo "No DVC remote configured; continuing with local artifacts if present"
          fi

      - name: DVC pull (if remote configured)
        run: |
          if [ -n "${{ env.DVC_REMOTE_URL }}" ]; then
            dvc pull || true
          else
            echo "Skipping dvc pull"
          fi

      - name: Run DVC repro
        run: |
          if [ -f dvc.yaml ]; then
            dvc repro || true
          else
            echo "No dvc.yaml found; skipping repro"
          fi

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-metrics
          path: |
            metrics/metrics.json || true

  publish:
    name: Build & Publish images (GHCR)
    runs-on: ubuntu-latest
    needs: docker-compose-deploy
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_TAG: ${{ github.sha }}
      GHCR_REGISTRY: ghcr.io
      GHCR_OWNER: ${{ github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ env.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.django
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/lybrary_dit-django:${{ env.IMAGE_TAG }}

      - name: Build and push Reco API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.reco
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/lybrary_dit-reco:${{ env.IMAGE_TAG }}

      - name: Build and push ML service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/lybrary_dit-ml:${{ env.IMAGE_TAG }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/lybrary_dit-frontend:${{ env.IMAGE_TAG }}

