preprocess:
  required_columns:
    - user_id
    - book_id
    - status
  status_rating_map:
    returned: 5
    renewed: 4
    active: 3
    overdue: 2
    unknown: 3
  fill_missing_category: unknown

train:
  algorithm: svd
  n_factors: 50
  n_epochs: 20
  lr_all: 0.005
  reg_all: 0.02
  test_size: 0.2
  random_state: 42

evaluate:
  test_size: 0.2
  random_state: 42
